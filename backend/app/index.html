<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GPS Jugador</title>
  <style>
    :root {
      --bg: #0b1114;
      --panel: #111b20;
      --panel-2: #17242a;
      --line: #2b3d45;
      --text: #f3f8f7;
      --muted: #9db0b7;
      --accent: #38d976;
      --accent-2: #4fb3ff;
      --danger: #ff5d5d;
      --warn: #ffca5f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(56, 217, 118, 0.18), transparent 32rem),
        linear-gradient(160deg, #0b1114 0%, #10191d 50%, #0e1518 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 520px);
      margin: 0 auto;
      padding: 22px 16px 28px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 1.55rem;
      letter-spacing: 0;
    }

    .status-pill {
      min-width: 96px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .status-pill.active {
      color: #062111;
      border-color: transparent;
      background: var(--accent);
    }

    section {
      margin-top: 14px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(17, 27, 32, 0.88);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.22);
    }

    label {
      display: block;
      margin: 12px 0 7px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--text);
      background: #0d1518;
      font: inherit;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(79, 179, 255, 0.16);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      color: #06120a;
      background: var(--accent);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      color: var(--text);
      border: 1px solid var(--line);
      background: var(--panel-2);
    }

    button.danger {
      color: #fff;
      background: var(--danger);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .context {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.35;
    }

    .context strong {
      color: var(--text);
    }

    .metric {
      min-height: 84px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0d1518;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 1.45rem;
      line-height: 1;
    }

    .log {
      min-height: 72px;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #0d1518;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .quality {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warn);
    }

    .dot.good { background: var(--accent); }
    .dot.bad { background: var(--danger); }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>GPS Jugador</h1>
        <div class="quality"><i id="qualityDot" class="dot"></i><span id="qualityText">Listo para capturar</span></div>
      </div>
      <div id="status" class="status-pill">Detenido</div>
    </header>

    <section>
      <div class="context">
        <div>Jugador: <strong id="jugadorNombre">Sin seleccionar</strong></div>
        <div>Sesión activa: <strong id="sesionNombre">Sin seleccionar</strong></div>
      </div>

      <label for="sesion_id">ID de sesión</label>
      <input id="sesion_id" autocomplete="off" placeholder="Pega el sesion_id" onchange="guardarConfiguracionMapa()" />

      <label for="jugador_id">ID de jugador</label>
      <input id="jugador_id" autocomplete="off" placeholder="Pega el jugador_id" onchange="guardarConfiguracionMapa()" />

      <label for="inicio_cancha">Lugar donde empiezas</label>
      <select id="inicio_cancha" onchange="guardarConfiguracionMapa()">
        <option value="centro" selected>Centro de la cancha</option>
        <option value="media_borde_superior">Línea media - borde superior</option>
        <option value="media_borde_inferior">Línea media - borde inferior</option>
      </select>

      <label for="rotacion_mapa">Orientación esperada en el mapa</label>
      <select id="rotacion_mapa" onchange="guardarConfiguracionMapa()">
        <option value="0" selected>Normal</option>
        <option value="90">Rotar 90°</option>
        <option value="180">Rotar 180°</option>
        <option value="270">Rotar 270°</option>
      </select>

      <div class="controls">
        <button id="startBtn" onclick="iniciarGPS().catch(manejarFalloInicio)">Iniciar GPS</button>
        <button id="stopBtn" class="danger" onclick="detenerYEnviar()" disabled>Detener GPS y Enviar</button>
        <button id="clearBtn" class="secondary" onclick="limpiarCaptura()">Limpiar captura local</button>
      </div>
    </section>

    <section>
      <div class="grid">
        <div class="metric"><span>Puntos aceptados</span><strong id="puntos">0</strong></div>
        <div class="metric"><span>Precisión actual</span><strong id="precision">-- m</strong></div>
        <div class="metric"><span>Latitud actual</span><strong id="latitud">--</strong></div>
        <div class="metric"><span>Longitud actual</span><strong id="longitud">--</strong></div>
        <div class="metric"><span>Velocidad actual</span><strong id="velocidad">0.0</strong></div>
        <div class="metric"><span>Último envío</span><strong id="ultimoEnvio">--</strong></div>
      </div>
      <div id="log" class="log">El teléfono guardará los puntos localmente hasta que detengas la captura.</div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "gps_futbol_buffer";
    const params = new URLSearchParams(window.location.search);
    const sesionInput = document.getElementById("sesion_id");
    const jugadorInput = document.getElementById("jugador_id");
    const inicioInput = document.getElementById("inicio_cancha");
    const rotacionInput = document.getElementById("rotacion_mapa");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const qualityDot = document.getElementById("qualityDot");
    const qualityText = document.getElementById("qualityText");

    const CALIBRACION_MS = 7000;
    const PRECISION_IDEAL = 20;
    const PRECISION_MAXIMA = 30;
    const VELOCIDAD_CAMINATA_MS = 1.2 / 3.6;
    const VELOCIDAD_MAXIMA_REALISTA_MS = 35 / 3.6;
    const ACELERACION_MAXIMA_REALISTA = 5;
    const CANDIDATOS_MOVIMIENTO_REQUERIDOS = 2;

    let watchId = null;
    let puntos = cargarBuffer();
    let ultimoPunto = puntos[puntos.length - 1] || null;
    let baseCalibracion = null;
    let inicioCalibracion = 0;
    let puntosCalibracion = [];
    let candidatosMovimiento = [];
    let velocidadAnteriorAceptada = 0;
    let contadores = crearContadores();

    precargarContexto();
    pintarEstado();

    function precargarContexto() {
      const sesionActiva = JSON.parse(localStorage.getItem("sesion_activa") || "null");
      const jugadorActivo = JSON.parse(localStorage.getItem("jugador_activo") || "null");
      const sesionId = params.get("sesion_id") || (sesionActiva && sesionActiva.id) || "";
      const jugadorId = params.get("jugador_id") || (jugadorActivo && jugadorActivo.id) || "";
      const sesionNombre = params.get("sesion_nombre") || (sesionActiva && sesionActiva.nombre) || "Sin seleccionar";
      const jugadorNombre = params.get("jugador_nombre") || (jugadorActivo && jugadorActivo.nombre) || "Sin seleccionar";

      sesionInput.value = sesionId;
      jugadorInput.value = jugadorId;
      document.getElementById("sesionNombre").textContent = sesionNombre;
      document.getElementById("jugadorNombre").textContent = jugadorNombre;
      cargarConfiguracionMapa();
      guardarConfiguracionMapa();
    }

    function claveConfiguracionMapa() {
      const sesionId = sesionInput.value.trim();
      const jugadorId = jugadorInput.value.trim();
      if (!sesionId || !jugadorId) return null;
      return `gps_futbol_mapa_v2_${sesionId}_${jugadorId}`;
    }

    function cargarConfiguracionMapa() {
      const inicioParam = params.get("inicio_cancha");
      const rotacionParam = params.get("rotacion_mapa");
      const key = claveConfiguracionMapa();
      let guardado = null;
      if (key) {
        try {
          guardado = JSON.parse(localStorage.getItem(key) || "null");
        } catch {
          guardado = null;
        }
      }

      if (inicioParam || (guardado && guardado.inicio)) {
        inicioInput.value = inicioParam || guardado.inicio;
      }
      if (rotacionParam || (guardado && guardado.rotacion)) {
        rotacionInput.value = rotacionParam || guardado.rotacion;
      }
    }

    function guardarConfiguracionMapa() {
      const key = claveConfiguracionMapa();
      if (!key) return;
      localStorage.setItem(key, JSON.stringify({
        inicio: inicioInput.value,
        rotacion: rotacionInput.value
      }));
    }

    function cargarBuffer() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function guardarBuffer() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(puntos));
    }

    function setLog(texto) {
      logEl.textContent = texto;
    }

    function crearContadores() {
      return {
        recibidos: 0,
        aceptados: puntos.length,
        bajaPrecision: 0,
        quieto: 0,
        saltos: 0
      };
    }

    function resumenContadores() {
      return `Recibidos: ${contadores.recibidos} | Aceptados: ${puntos.length} | Baja precisión: ${contadores.bajaPrecision} | Quieto: ${contadores.quieto} | Saltos: ${contadores.saltos}`;
    }

    function pintarEstado() {
      document.getElementById("puntos").textContent = puntos.length;
      document.getElementById("ultimoEnvio").textContent = localStorage.getItem("gps_futbol_ultimo_envio") || "--";
    }

    function desbloquearInicio() {
      if (watchId === null) {
        startBtn.disabled = false;
        stopBtn.disabled = true;
        statusEl.textContent = "Detenido";
        statusEl.classList.remove("active");
      }
    }

    function manejarFalloInicio(error) {
      qualityDot.className = "dot bad";
      qualityText.textContent = "No se pudo iniciar";
      desbloquearInicio();
      setLog(`No se pudo iniciar el GPS. ${error.message || "Intenta nuevamente."}`);
    }

    function velocidadCalculada(lat1, lon1, lat2, lon2, segundos) {
      if (!segundos || segundos <= 0) return 0;
      const rad = Math.PI / 180;
      const r = 6371000;
      const dLat = (lat2 - lat1) * rad;
      const dLon = (lon2 - lon1) * rad;
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1 * rad) * Math.cos(lat2 * rad) * Math.sin(dLon / 2) ** 2;
      return (r * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))) / segundos;
    }

    function distanciaMetros(lat1, lon1, lat2, lon2) {
      return velocidadCalculada(lat1, lon1, lat2, lon2, 1);
    }

    function distanciaEntrePuntos(a, b) {
      return distanciaMetros(a.latitud, a.longitud, b.latitud, b.longitud);
    }

    function calcularVelocidadPunto(origen, destino) {
      if (!origen || !destino) return Number(destino && destino.velocidad || 0);
      const segundos = (new Date(destino.timestamp) - new Date(origen.timestamp)) / 1000;
      if (!segundos || segundos <= 0) return 0;
      return distanciaEntrePuntos(origen, destino) / segundos;
    }

    function velocidadNavegadorValida(coords) {
      const speed = Number(coords.speed);
      return Number.isFinite(speed) && speed > 0 && speed <= VELOCIDAD_MAXIMA_REALISTA_MS ? speed : 0;
    }

    function velocidadConfiable(coords, origen, destino) {
      const calculada = calcularVelocidadPunto(origen, destino);
      const navegador = velocidadNavegadorValida(coords);
      if (!navegador) return calculada;
      if (!calculada) return navegador;
      return Math.abs(navegador - calculada) > 2.5 ? calculada : Math.min(navegador, calculada);
    }

    function umbralMovimiento(puntoA, puntoB) {
      const precision = Math.max(
        Number(puntoA && puntoA.precision_gps || 0),
        Number(puntoB && puntoB.precision_gps || 0),
        4
      );
      return Math.max(3, precision * 0.75);
    }

    function puntoMediano(puntosGps) {
      const mejores = [...puntosGps]
        .filter(p => p.precision_gps && p.precision_gps <= PRECISION_MAXIMA)
        .sort((a, b) => a.precision_gps - b.precision_gps)
        .slice(0, 7);
      const base = mejores.length ? mejores : [...puntosGps].sort((a, b) => a.precision_gps - b.precision_gps).slice(0, 5);
      if (!base.length) return null;
      const latitudes = base.map(p => p.latitud).sort((a, b) => a - b);
      const longitudes = base.map(p => p.longitud).sort((a, b) => a - b);
      const precisiones = base.map(p => p.precision_gps).sort((a, b) => a - b);
      const mid = Math.floor(base.length / 2);
      return {
        latitud: latitudes[mid],
        longitud: longitudes[mid],
        precision_gps: precisiones[mid] || PRECISION_MAXIMA,
        velocidad: 0,
        timestamp: base[base.length - 1].timestamp
      };
    }

    function actualizarLecturaGPS(punto) {
      document.getElementById("precision").textContent = `${Math.round(punto.precision_gps)} m`;
      document.getElementById("latitud").textContent = punto.latitud.toFixed(6);
      document.getElementById("longitud").textContent = punto.longitud.toFixed(6);
      document.getElementById("velocidad").textContent = `${(punto.velocidad * 3.6).toFixed(1)} km/h`;
    }

    function actualizarCalidad(punto) {
      qualityDot.className = punto.precision_gps <= 10 ? "dot good" : punto.precision_gps <= PRECISION_IDEAL ? "dot" : "dot bad";
      qualityText.textContent = punto.precision_gps <= 10 ? "Señal GPS buena" : punto.precision_gps <= PRECISION_IDEAL ? "Señal aceptable" : "Señal GPS débil";
    }

    function aceptarPunto(punto) {
      puntos.push(punto);
      ultimoPunto = punto;
      velocidadAnteriorAceptada = punto.velocidad || 0;
      candidatosMovimiento = [];
      contadores.aceptados = puntos.length;
      guardarBuffer();
      pintarEstado();
    }

    function descartarPunto(motivo, mensaje) {
      contadores[motivo] += 1;
      setLog(`${mensaje}. ${resumenContadores()}`);
    }

    function evaluarMovimiento(punto, coords) {
      const referencia = ultimoPunto || baseCalibracion;
      if (!referencia) {
        descartarPunto("quieto", "GPS estable. Esperando movimiento real");
        return;
      }

      punto.velocidad = velocidadConfiable(coords, referencia, punto);
      const distancia = distanciaEntrePuntos(referencia, punto);
      const umbral = umbralMovimiento(referencia, punto);
      const segundos = Math.max(0.1, (new Date(punto.timestamp) - new Date(referencia.timestamp)) / 1000);
      const aceleracion = (punto.velocidad - velocidadAnteriorAceptada) / segundos;

      if (punto.velocidad > VELOCIDAD_MAXIMA_REALISTA_MS || Math.abs(aceleracion) > ACELERACION_MAXIMA_REALISTA) {
        candidatosMovimiento = [];
        descartarPunto("saltos", "Salto GPS imposible ignorado");
        return;
      }

      if (distancia < umbral && punto.velocidad < VELOCIDAD_CAMINATA_MS) {
        candidatosMovimiento = [];
        descartarPunto("quieto", "Sin movimiento real detectado");
        return;
      }

      candidatosMovimiento.push({ punto, distancia });
      if (candidatosMovimiento.length > CANDIDATOS_MOVIMIENTO_REQUERIDOS) {
        candidatosMovimiento.shift();
      }

      const distanciaSostenida = candidatosMovimiento.reduce((total, item) => total + item.distancia, 0);
      const velocidadSostenida = candidatosMovimiento.some(item => item.punto.velocidad >= VELOCIDAD_CAMINATA_MS);
      const movimientoConfirmado = candidatosMovimiento.length >= CANDIDATOS_MOVIMIENTO_REQUERIDOS
        && (velocidadSostenida || distanciaSostenida >= umbral);

      if (!movimientoConfirmado) {
        descartarPunto("quieto", "Posible movimiento, confirmando señal");
        return;
      }

      if (!ultimoPunto && baseCalibracion) {
        aceptarPunto({
          ...baseCalibracion,
          timestamp: candidatosMovimiento[0].punto.timestamp,
          velocidad: 0
        });
      }

      candidatosMovimiento.forEach(item => {
        item.punto.velocidad = velocidadConfiable(coords, ultimoPunto, item.punto);
        aceptarPunto(item.punto);
      });

      statusEl.textContent = "Capturando";
      setLog(`Capturando. ${resumenContadores()}`);
    }

    async function iniciarGPS() {
      startBtn.disabled = true;
      stopBtn.disabled = true;
      statusEl.textContent = "Validando sesión";
      statusEl.classList.add("active");
      qualityText.textContent = "Preparando GPS";
      setLog("Validando sesión del coach antes de pedir ubicación...");

      if (!window.isSecureContext) {
        qualityDot.className = "dot bad";
        qualityText.textContent = "Sitio no seguro";
        desbloquearInicio();
        setLog("El GPS del navegador solo funciona en HTTPS. Abre la URL segura de Render que empieza con https://.");
        return;
      }

      let authResponse;
      try {
        authResponse = await fetch("/auth/me", { credentials: "same-origin" });
        if (authResponse.status === 401 && await renovarSesionAuth()) {
          authResponse = await fetch("/auth/me", { credentials: "same-origin" });
        }
      } catch {
        qualityDot.className = "dot bad";
        qualityText.textContent = "Sesión no verificada";
        desbloquearInicio();
        setLog("No se pudo comprobar la sesión del coach.");
        return;
      }
      if (!authResponse.ok) {
        qualityDot.className = "dot bad";
        qualityText.textContent = "Inicia sesión";
        desbloquearInicio();
        setLog("Debes iniciar sesión como coach en esta misma dirección web antes de capturar GPS.");
        return;
      }

      if (!sesionInput.value.trim() || !jugadorInput.value.trim()) {
        qualityDot.className = "dot bad";
        qualityText.textContent = "Faltan datos";
        desbloquearInicio();
        setLog("Completa sesion_id y jugador_id antes de iniciar.");
        return;
      }

      guardarConfiguracionMapa();

      if (!navigator.geolocation) {
        qualityDot.className = "dot bad";
        qualityText.textContent = "GPS no disponible";
        desbloquearInicio();
        setLog("Este navegador no soporta geolocalización.");
        return;
      }

      puntos = [];
      ultimoPunto = null;
      baseCalibracion = null;
      inicioCalibracion = Date.now();
      puntosCalibracion = [];
      candidatosMovimiento = [];
      velocidadAnteriorAceptada = 0;
      contadores = crearContadores();
      guardarBuffer();
      pintarEstado();

      watchId = navigator.geolocation.watchPosition(registrarPunto, manejarError, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 12000
      });

      statusEl.textContent = "Calibrando";
      statusEl.classList.add("active");
      stopBtn.disabled = false;
      qualityText.textContent = "Calibrando GPS";
      setLog("Calibrando GPS, mantente quieto 7 segundos.");
    }

    function registrarPunto(position) {
      const coords = position.coords;
      const timestamp = new Date(position.timestamp).toISOString();
      const base = {
        latitud: coords.latitude,
        longitud: coords.longitude,
        precision_gps: Number(coords.accuracy || 999),
        timestamp,
        velocidad: 0
      };
      contadores.recibidos += 1;
      actualizarLecturaGPS(base);
      actualizarCalidad(base);

      if (Date.now() - inicioCalibracion < CALIBRACION_MS) {
        if (base.precision_gps <= PRECISION_MAXIMA) {
          puntosCalibracion.push(base);
        } else {
          contadores.bajaPrecision += 1;
        }
        statusEl.textContent = "Calibrando";
        setLog(`Calibrando GPS, mantente quieto. ${resumenContadores()}`);
        return;
      }

      if (!baseCalibracion) {
        baseCalibracion = puntoMediano(puntosCalibracion);
        if (!baseCalibracion) {
          inicioCalibracion = Date.now();
          puntosCalibracion = [];
          setLog("Señal GPS débil. Calibrando nuevamente al aire libre.");
          return;
        }
        statusEl.textContent = "GPS estable";
        qualityText.textContent = "GPS estable";
        setLog(`GPS estable. Empieza a caminar. ${resumenContadores()}`);
      }

      if (base.precision_gps > PRECISION_MAXIMA) {
        descartarPunto("bajaPrecision", "Señal GPS débil");
        return;
      }

      evaluarMovimiento(base, coords);
    }

    function manejarError(error) {
      qualityDot.className = "dot bad";

      if (error.code === 1) {
        if (watchId !== null) {
          navigator.geolocation.clearWatch(watchId);
          watchId = null;
        }
        statusEl.textContent = "Permiso denegado";
        statusEl.classList.remove("active");
        qualityText.textContent = "Ubicación bloqueada";
        startBtn.disabled = false;
        stopBtn.disabled = true;
        setLog("Permite la ubicación precisa para este sitio en los ajustes del navegador y vuelve a intentar.");
        return;
      }

      if (error.code === 2) {
        qualityText.textContent = "Buscando señal GPS";
        setLog("No se pudo obtener la ubicación. Activa el GPS y prueba al aire libre.");
        return;
      }

      qualityText.textContent = "Esperando ubicación";
      setLog("La ubicación está tardando. Mantén la pantalla abierta y prueba al aire libre.");
    }

    async function detenerYEnviar() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      statusEl.textContent = "Enviando";
      statusEl.classList.remove("active");
      stopBtn.disabled = true;

      if (puntos.length === 0) {
        startBtn.disabled = false;
        statusEl.textContent = "Detenido";
        setLog(`No hay movimiento real para enviar. ${resumenContadores()}`);
        return;
      }

      try {
        let response = await enviarLote();
        if (response.status === 401 && await renovarSesionAuth()) {
          response = await enviarLote();
        }

        const json = await response.json();
        if (!response.ok) throw new Error(JSON.stringify(json));

        const hora = new Date().toLocaleTimeString();
        localStorage.setItem("gps_futbol_ultimo_envio", hora);
        puntos = [];
        ultimoPunto = null;
        baseCalibracion = null;
        candidatosMovimiento = [];
        contadores = crearContadores();
        guardarBuffer();
        pintarEstado();
        setLog(`Envío correcto. Puntos enviados: ${json.puntos_recibidos}.`);
      } catch (error) {
        setLog(`No se pudo enviar. Los puntos siguen guardados localmente. ${error.message}`);
      } finally {
        startBtn.disabled = false;
        statusEl.textContent = "Detenido";
      }
    }

    function enviarLote() {
      return fetch("/gps/lote", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            sesion_id: sesionInput.value.trim(),
            jugador_id: jugadorInput.value.trim(),
            puntos
          })
        });
    }

    async function renovarSesionAuth() {
      const response = await fetch("/auth/refresh", {
        method: "POST",
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({})
      });
      if (!response.ok) {
        return false;
      }
      const data = await response.json();
      return Boolean(data.autenticado);
    }

    function limpiarCaptura() {
      if (watchId !== null) return;
      puntos = [];
      ultimoPunto = null;
      baseCalibracion = null;
      puntosCalibracion = [];
      candidatosMovimiento = [];
      velocidadAnteriorAceptada = 0;
      contadores = crearContadores();
      guardarBuffer();
      pintarEstado();
      setLog("Captura local limpiada.");
    }
  </script>
</body>
